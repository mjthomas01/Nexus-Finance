<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Finance | Expense Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Feather Icons -->
  <script src="https://unpkg.com/feather-icons"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <!-- Login View -->
  <div id="login-view" class="login-container glass">
    <div class="login-card">
      <div class="logo" style="justify-content: center; margin-bottom: 2rem;">
        <i data-feather="hexagon" class="logo-icon"></i>
        <h1>Nexus Finance</h1>
      </div>
      <h2 id="auth-title" style="text-align: center; margin-bottom: 1.5rem; font-weight: 600;">Sign In</h2>
      <form id="auth-form">
        <div class="form-group">
          <label for="auth-email">Email</label>
          <input type="email" id="auth-email" placeholder="example@nexus.com" required>
        </div>
        <div class="form-group">
          <label for="auth-password">Password</label>
          <input type="password" id="auth-password" placeholder="••••••••" required>
        </div>
        <button type="submit" id="auth-submit-btn" class="btn-primary" style="margin-top: 1rem; width: 100%;">Login</button>
        <div id="auth-error" style="color: var(--danger); text-align: center; margin-top: 1rem; font-size: 0.9rem; font-weight: 500;"></div>
      </form>
      <div style="text-align: center; margin-top: 1.5rem;">
        <p style="color: var(--text-secondary); font-size: 0.95rem;">
          <span id="auth-toggle-text">Don't have an account?</span> 
          <a href="#" id="auth-toggle-link" style="color: var(--accent-primary); font-weight: 600; text-decoration: none;">Sign Up</a>
        </p>
      </div>
      
      <div style="display: flex; align-items: center; justify-content: center; margin: 1.5rem 0;">
        <div style="flex: 1; height: 1px; background: var(--glass-border);"></div>
        <span style="padding: 0 10px; color: var(--text-secondary); font-size: 0.85rem; font-weight: 600;">OR</span>
        <div style="flex: 1; height: 1px; background: var(--glass-border);"></div>
      </div>

      <button type="button" id="google-signin-btn" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 0.75rem; border-radius: var(--radius-md); border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-primary); font-weight: 600; cursor: pointer; transition: var(--transition);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

    </div>
  </div>

  <div class="app-container hidden" id="app-content">
    <header class="app-header glass">
      <div class="logo">
        <i data-feather="hexagon" class="logo-icon"></i>
        <h1>Nexus Finance</h1>
      </div>
      <div class="header-actions" style="display: flex; gap: 1rem; align-items: center;">
        <button id="manage-wallets-btn" class="btn-primary" style="margin-top: 0; padding: 0.5rem 1rem; font-size: 0.875rem;">
          <i data-feather="credit-card" style="width: 16px; height: 16px;"></i> Manage Wallets
        </button>
        <button id="logout-btn" class="icon-btn" aria-label="Sign Out" title="Sign Out">
          <i data-feather="log-out"></i>
        </button>
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
          <i data-feather="sun"></i>
        </button>
      </div>
    </header>

    <main class="dashboard">
      <section class="summary-cards" id="wallets-container">
        <!-- Wallets will be injected here dynamically -->
      </section>

      <!-- View Navigation Tabs -->
      <div class="view-tabs" style="display: flex; gap: 1rem; margin-bottom: 1.5rem; justify-content: center;">
        <button type="button" id="tab-transactions" onclick="switchTab('transactions')" class="tab-btn active" style="padding: 0.5rem 1.5rem; border-radius: var(--radius-md); border: none; background: var(--accent-primary); color: white; font-weight: 600; cursor: pointer; transition: var(--transition);">Transactions</button>
        <button type="button" id="tab-dashboard" onclick="switchTab('dashboard')" class="tab-btn" style="padding: 0.5rem 1.5rem; border-radius: var(--radius-md); border: none; background: var(--glass-bg); color: var(--text-primary); font-weight: 600; cursor: pointer; transition: var(--transition);">Dashboard</button>
      </div>

      <!-- Transactions View -->
      <div id="transactions-view" class="main-content">
        <section class="transaction-form-section glass">
          <h2>Add New Transaction</h2>
          <form id="transaction-form">
            <div class="form-group">
              <label for="desc">Description</label>
              <input type="text" id="desc" placeholder="e.g. Groceries, Salary" required>
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label for="amount">Amount</label>
                <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" required>
              </div>
              <div class="form-group">
                <label for="type">Type</label>
                <select id="type" required>
                  <option value="expense">Expense</option>
                  <option value="income">Income</option>
                  <option value="transfer">Transfer</option>
                </select>
              </div>
            </div>

            <div class="form-row" id="standard-fields">
              <div class="form-group">
                <label for="wallet">Wallet</label>
                <select id="wallet" class="wallet-select">
                  <!-- Dynamically populated via app.js -->
                </select>
              </div>
              <div class="form-group">
                <label for="category">Category</label>
                <select id="category">
                  <!-- Dynamically populated via app.js -->
                </select>
              </div>
            </div>

            <!-- New Split Expense Section -->
            <div class="form-group hidden" id="split-checkbox-wrap" style="align-items: center; margin-bottom: 1rem; flex-direction: row; gap: 0.5rem;">
              <input type="checkbox" id="is-split" style="width: auto; margin-top: 0;">
              <label for="is-split" style="margin-bottom: 0;">Split this expense with others?</label>
            </div>

            <div class="form-row hidden" id="split-fields">
              <div class="form-group">
                <label for="split-people">How many people? (incl. you)</label>
                <input type="number" id="split-people" min="2" placeholder="e.g. 2">
              </div>
              <div class="form-group">
                <label for="split-wallet">Split Wallet (Owed funds)</label>
                <select id="split-wallet" class="wallet-select">
                  <!-- Dynamically populated via app.js -->
                </select>
              </div>
            </div>

            <div class="form-row hidden" id="transfer-fields">
              <div class="form-group">
                <label for="from-wallet">From Wallet</label>
                <select id="from-wallet" class="wallet-select">
                  <!-- Dynamically populated via app.js -->
                </select>
              </div>
              <div class="form-group">
                <label for="to-wallet">To Wallet</label>
                <select id="to-wallet" class="wallet-select">
                  <!-- Dynamically populated via app.js -->
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" required>
              </div>
            </div>

            <button type="submit" class="btn-primary">
              <i data-feather="plus"></i> Add Transaction
            </button>
          </form>
        </section>

        <section class="transaction-history-section glass">
          <div class="history-header">
            <h2>Recent Transactions</h2>
            <div class="filter-group">
              <select id="filter-type">
                <option value="all">All</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
              </select>
            </div>
          </div>
          
          <div class="history-list-wrapper">
             <ul id="transaction-list" class="transaction-list">
                <!-- Transactions will be injected here via JS -->
             </ul>
             <div id="empty-state" class="empty-state hidden">
               <i data-feather="inbox"></i>
               <p>No transactions found.</p>
             </div>
          </div>
        </section>
      </div>

      <!-- Dashboard View -->
      <div id="dashboard-view" class="main-content hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; max-width: 800px; margin-left: auto; margin-right: auto; width: 100%;">
          <h2>Monthly Analytics</h2>
          <div class="form-group" style="margin-bottom: 0; min-width: 200px;">
            <input type="month" id="dashboard-month-filter" style="margin-top: 0;">
          </div>
        </div>
        
        <div style="display: flex; flex-direction: column; align-items: center; max-width: 800px; margin: 0 auto; width: 100%; gap: 1.5rem;">
          
          <section class="glass" style="padding: 2rem; width: 100%; border-radius: var(--radius-lg);">
            <div style="position: relative; height: 300px; width: 100%;">
              <canvas id="income-expense-chart"></canvas>
               <div id="empty-bar-chart-state" class="empty-state hidden" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; text-align: center;">
                 <i data-feather="bar-chart-2"></i>
                 <p>No data for this month.</p>
               </div>
            </div>
          </section>

          <section class="glass" style="padding: 2rem; width: 100%; border-radius: var(--radius-lg);">
            <h3 style="margin-bottom: 1.5rem; text-align: center;">Expense Breakdown</h3>
            <div style="position: relative; height: 350px; width: 100%;">
              <canvas id="expense-pie-chart"></canvas>
              <div id="empty-chart-state" class="empty-state hidden" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; text-align: center;">
                 <i data-feather="pie-chart"></i>
                 <p>No expenses logged for this month.</p>
               </div>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <!-- Wallet Manager Modal -->
  <div id="wallet-modal" class="modal-overlay hidden">
    <div class="modal glass">
      <div class="modal-header">
        <h2>Manage Wallets</h2>
        <button id="close-modal-btn" class="icon-btn"><i data-feather="x"></i></button>
      </div>
      <div class="modal-content">
        <form id="wallet-form">
          <div class="form-group">
            <label for="wallet-name">Wallet Name</label>
            <input type="text" id="wallet-name" placeholder="e.g. Chase Checkings" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="wallet-initial-balance">Initial Balance</label>
              <input type="number" id="wallet-initial-balance" placeholder="0.00" step="0.01" required>
            </div>
            <div class="form-group">
              <label for="wallet-icon">Icon</label>
              <select id="wallet-icon" required>
                <option value="briefcase">Bank/Briefcase</option>
                <option value="credit-card">Credit Card</option>
                <option value="smartphone">Online/Phone</option>
                <option value="users">Split/Friends</option>
              </select>
            </div>
          </div>
          <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button type="submit" id="wallet-submit-btn" class="btn-primary" style="flex: 1;">Add Wallet</button>
            <button type="button" id="wallet-cancel-btn" class="btn-secondary hidden" style="flex: 1; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: var(--text-primary); border-radius: 8px;">Cancel Edit</button>
          </div>
        </form>
        <div class="wallet-list-container">
          <h3>Your Wallets</h3>
          <ul id="modal-wallet-list" class="transaction-list">
            <!-- Wallets injected here -->
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase Data Compat Libraries -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
  <script>
    feather.replace();
  </script>
</body>
</html>
